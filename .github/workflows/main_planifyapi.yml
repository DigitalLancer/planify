# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - planifyapi

on:
  push:
    branches:
      - main
          paths:
      - 'backend/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
          
      - name: Restore
        run: dotnet restore ./backend/Planify.API/Planify.API/Planify.API.csproj

      - name: Build with dotnet
        run: dotnet build ./backend/Planify.API/Planify.API/Planify.API.csproj --configuration Release --no-restore

      - name: dotnet publish
        run: dotnet publish ./backend/Planify.API/Planify.API/Planify.API.csproj -c Release -o ./publish

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./publish
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_50118908744744A9B6BEE4170E423561 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2A7A83E2407E49749F03AC650F75865F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_3260FEF0D68B4ABFB26F3B63CEBF3742 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'planifyapi'
          slot-name: 'Production'
          package: ./publish
          
